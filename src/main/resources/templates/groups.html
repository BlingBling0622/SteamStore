<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css"><title>Groups - Steam</title>
<style>
.gp{display:flex;flex:1;overflow:hidden}.gl{width:280px;background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0}
.gl h3{font-size:.68rem;color:#5c7e9c;text-transform:uppercase;letter-spacing:.05em;padding:.6rem .8rem .3rem;font-weight:600}
.cf{padding:.4rem .8rem;display:flex;gap:.3rem}.cf input{flex:1;padding:.4rem .55rem;font-size:.8rem}.cf button{padding:.4rem .6rem;font-size:.75rem}
.gi{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03)}
.gi:hover,.gi.on{background:rgba(103,193,245,.08)}.gi.on{background:rgba(103,193,245,.18)}
.rp{flex:1;display:flex;overflow:hidden;padding:1rem;gap:1rem}
.cm{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);border-radius:6px;border:1px solid var(--border2);max-height:calc(100vh - 120px);min-height:400px}
.chh{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border3);border-radius:6px 6px 0 0}
.chm{flex:1;overflow-y:auto;padding:.8rem;background:var(--bg)}
.chb{display:flex;gap:.4rem;padding:.55rem .8rem;background:var(--bg2);border-top:1px solid var(--border3);border-radius:0 0 6px 6px}
.chb textarea{flex:1;min-height:34px;max-height:80px}
.msg-body{display:flex;flex-direction:column;align-items:flex-start}
.mp{width:200px;background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;border-radius:6px;border:1px solid var(--border2);overflow:hidden;max-height:calc(100vh - 120px)}
.mp h3{font-size:.68rem;color:#5c7e9c;text-transform:uppercase;letter-spacing:.05em;padding:.55rem .7rem;font-weight:600;display:flex;justify-content:space-between}
.mi{display:flex;align-items:center;gap:.35rem;padding:.3rem .5rem;border-radius:2px}.mi:hover{background:rgba(255,255,255,.03)}
.mi .ma{width:22px;height:22px;border-radius:50%;background:var(--border1);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden}.mi .ma img{width:100%;height:100%;object-fit:cover}
.mi .mn{font-size:.75rem;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi .mr{font-size:.58rem;color:#5c7e9c}.mi .mx{display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.65rem}.mi:hover .mx{display:inline}.mi .mx:hover{color:var(--red)}
.ib{padding:.4rem .7rem;border-top:1px solid rgba(255,255,255,.05)}.ib input{width:100%;padding:.3rem .45rem;font-size:.72rem;margin-bottom:.15rem}
.ir{max-height:100px;overflow-y:auto}.ir .r{display:flex;align-items:center;justify-content:space-between;padding:.2rem .3rem;font-size:.72rem}.ir .r:hover{background:rgba(103,193,245,.08)}
</style></head><body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>
<div class="gp flex1">
<div class="gl"><h3>CREATE GROUP</h3><form class="cf" th:action="@{/groups/create}" method="post"><input type="text" name="name" placeholder="Group name..." required maxlength="50"><button class="btn btn-g" type="submit">Create</button></form>
<h3>YOUR GROUPS</h3><div class="flex1" style="overflow-y:auto" id="glist"><div th:if="${groups.isEmpty()}" class="fs-sm muted p1">No groups yet</div>
<div th:each="g:${groups}" class="gi" th:data-id="${g.id}" th:data-name="${g.name}" th:classappend="${activeGroupId!=null&&activeGroupId==g.id?'on':''}" onclick="selG(this)"><div class="fav" style="width:32px;height:32px">#</div><div class="flex1"><div class="white fs-sm" th:text="${g.name}"></div></div><div class="fs-xs muted" th:text="${g.memberCount}"></div></div></div></div>
<div class="rp"><div id="nochat" style="flex:1;align-self:stretch;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center"><div><h3 style="color:#fff;font-size:28px;margin-bottom:8px">Group Chat</h3><p style="color:var(--muted);font-size:18px">Select or create a group</p></div></div>
<div id="chat" class="hidden" style="flex:1;align-self:stretch;overflow:hidden"><div class="cm" style="display:flex;flex-direction:column;flex:1"><div class="chh"><span class="white fs-sm" id="gn"></span><span class="fs-xs muted" id="gc"></span></div><div class="chm" id="gm"></div><div class="chb"><textarea id="ginp" placeholder="Message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendGMsg()}"></textarea><button id="gsbtn" class="btn btn-g" onclick="sendGMsg()">Send</button></div></div>
<div class="mp"><h3>MEMBERS <span style="font-weight:400;color:var(--muted)" id="mcnt"></span></h3><div class="flex1" style="overflow-y:auto;padding:0 .4rem" id="mlist"></div><div class="ib"><input type="text" placeholder="Search friends to invite..." id="invq" oninput="invSearch()" autocomplete="off"><div class="ir" id="invres"></div></div></div></div></div></div>
<footer>&copy; 2026 Steam Store &middot; Not affiliated with Valve Corporation</footer>
<script>
var ag=null,iv=null,mu=[[${user.id}]],mr='';
function selG(t){ag=t.getAttribute('data-id');document.querySelectorAll('.gi').forEach(function(i){i.classList.remove('on')});t.classList.add('on');document.getElementById('nochat').style.display='none';var c=document.getElementById('chat');c.classList.remove('hidden');c.style.display='flex';document.getElementById('gn').textContent=t.getAttribute('data-name');loadGMsgs();loadMem();if(iv)clearInterval(iv);iv=setInterval(loadGMsgs,3000)}
function loadGMsgs(){if(!ag)return;fetch('/groups/messages/'+ag).then(function(r){return r.json()}).then(function(ms){var h='',ld='',ls=null;for(var i=0;i<ms.length;i++){var m=ms[i],d=fd(m.createdAt);if(d!==ld){h+='<div style="text-align:center;color:var(--muted);font-size:.68rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:.4rem">'+d+'</div>';ld=d;ls=null}var isMine=m.senderId===mu,sc=m.senderId!==ls,cl='other';if(sc&&i>0)cl+=' new';h+='<div class="msg-row '+cl+'">';if(sc){if(m.senderAvatarUrl)h+='<div class="msg-av"><img src="'+esc(m.senderAvatarUrl)+'" alt=""></div>';else h+='<div class="msg-av">'+m.senderUsername.charAt(0).toUpperCase()+'</div>'}else{h+='<div class="msg-av ghost"></div>'}h+='<div class="msg-body">';if(sc)h+='<div class="msg-sender">'+esc(m.senderNickname||m.senderUsername)+(isMine?' (you)':'')+'</div>';h+='<div class="msg-bub">'+esc(m.content)+'</div><div class="msg-time">'+ft(m.createdAt)+'</div></div></div>';ls=m.senderId}if(!ms.length)h='<div style="text-align:center;color:var(--muted);padding:2rem">No messages yet</div>';var gm=document.getElementById('gm');gm.innerHTML=h;gm.scrollTop=gm.scrollHeight})}
function sendGMsg(){if(!ag)return;var inp=document.getElementById('ginp'),c=inp.value.trim();if(!c)return;var b=document.getElementById('gsbtn');b.disabled=true;b.textContent='...';var fd=new URLSearchParams();fd.append('groupId',ag);fd.append('content',c);fetch('/groups/send',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()}).then(function(r){return r.json()}).then(function(d){if(d.success){inp.value='';loadGMsgs()}else alert(d.error||'Failed');b.disabled=false;b.textContent='Send'}).catch(function(){b.disabled=false;b.textContent='Send'})}
function loadMem(){if(!ag)return;fetch('/groups/members/'+ag).then(function(r){return r.json()}).then(function(mem){var h='';for(var i=0;i<mem.length;i++){var m=mem[i];if(m.id===mu)mr=m.role;h+='<div class="mi"><div class="ma">';if(m.avatarUrl)h+='<img src="'+esc(m.avatarUrl)+'" alt="">';else h+=m.username.charAt(0).toUpperCase();h+='</div><span class="mn">'+esc(m.nickname)+'</span><span class="mr">'+(m.role==='OWNER'?'Owner':m.role==='ADMIN'?'Admin':'')+'</span>';if(mr!=='MEMBER'&&m.id!==mu&&m.role!=='OWNER'){h+='<form action="/groups/remove" method="post" style="display:inline" onsubmit="return confirm(\'Remove?\')"><input type="hidden" name="groupId" value="'+ag+'"><input type="hidden" name="userId" value="'+m.id+'"><button class="mx" type="submit">&times;</button></form>'}h+='</div>'}document.getElementById('mlist').innerHTML=h;document.getElementById('mcnt').textContent=mem.length})}
var itmr;function invSearch(){clearTimeout(itmr);var q=document.getElementById('invq').value.trim(),b=document.getElementById('invres');if(!q||!ag){b.innerHTML='';return}itmr=setTimeout(function(){fetch('/groups/friends-search?groupId='+ag+'&q='+encodeURIComponent(q)).then(function(r){return r.json()}).then(function(u){var h='';for(var i=0;i<u.length;i++){h+='<div class="r"><span>'+esc(u[i].nickname)+'</span><form action="/groups/invite" method="post"><input type="hidden" name="groupId" value="'+ag+'"><input type="hidden" name="userId" value="'+u[i].id+'"><button class="btn-xs" style="background:var(--green);color:#d2e885">+ Invite</button></form></div>'}if(!u.length)h='<div style="font-size:.7rem;color:var(--muted);padding:.2rem">No friends found</div>';b.innerHTML=h})},300)}
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function ft(d){return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function fd(d){var dt=new Date(d),n=new Date();if(dt.toDateString()===n.toDateString())return'Today';var y=new Date(n);y.setDate(y.getDate()-1);if(dt.toDateString()===y.toDateString())return'Yesterday';return dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}
(function(){var p=new URLSearchParams(window.location.search),gid=p.get('chat');if(gid){var el=document.querySelector(".gi[data-id='"+gid+"']");if(el)selG(el)}})();
</script></body></html>
