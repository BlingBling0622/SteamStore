<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css">
<title>Library - Steam</title>
<style>.main{padding:1.5rem 2rem}.sbar h3{font-size:.7rem;color:#5c7e9c;text-transform:uppercase;letter-spacing:.05em;margin:.8rem 0 .4rem;font-weight:600}.sbar h3:first-child{margin-top:0}
.sbar a{display:flex;justify-content:space-between;align-items:center;color:var(--text);padding:.3rem .5rem;border-radius:2px;font-size:.85rem}
.sbar a:hover,.sbar a.on{background:rgba(103,193,245,.15);color:var(--accent)}.sbar a.on{background:var(--accent);color:var(--white)}
.sbar .badge{font-size:.7rem;color:var(--muted);background:var(--bg);padding:.1rem .35rem;border-radius:8px}.sbar a.on .badge{background:rgba(0,0,0,.3);color:var(--white)}
.favbtn{position:absolute;top:.35rem;right:.35rem;width:26px;height:26px;background:rgba(0,0,0,.65);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--white);cursor:pointer;z-index:5;opacity:0;transition:.12s;border:none}
.favbtn:hover{background:var(--accent)}.favbtn.on{opacity:1;color:#f44}.gcard:hover .favbtn{opacity:.75}</style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>
<div class="wrap flex flex1">
    <aside class="side sbar">
        <h3>Library</h3>
        <a href="#" class="on" data-filter="all">All Games <span class="badge" th:text="${gameCount}">0</span></a>
        <a href="#" data-filter="favorites">Favorites <span class="badge" id="favBadge">0</span></a>
<h3>Collections</h3><a th:each="tag:${allTags}" href="#" th:attr="data-tag=${tag}"><span th:text="${tag}"></span></a>
    </aside>
    <div class="main flex1">
        <div th:if="${success}" class="alert alert-ok" th:text="${success}"></div>
        <div class="stats">
            <div class="stat"><div class="v" th:text="${gameCount}">0</div><div class="l">Games</div></div>
            <div class="stat"><div class="v" th:text="${cSym}+${#numbers.formatDecimal(totalSpent*cRate,1,cDec)}"></div><div class="l">Spent</div></div>
            <div class="stat"><div class="v" id="favCount">0</div><div class="l">Favorites</div></div>
        </div>
        <input type="text" placeholder="Search your library..." id="s" style="max-width:350px;margin-bottom:1rem" oninput="doSearch()">
        <div th:if="${purchasedGames.isEmpty()}" style="text-align:center;padding:3rem;color:var(--muted)"><h3 style="color:var(--white)">Your library is empty</h3><p>Browse the store to start your collection</p><a href="/store" class="btn btn-g mt1">Browse Store</a></div>
        <div id="noRes" class="hidden" style="text-align:center;padding:3rem;color:var(--muted)"><h3 style="color:var(--white)">No games found</h3><p>Try a different filter</p></div>
        <div class="ggrid" id="grid" th:unless="${purchasedGames.isEmpty()}">
            <a th:each="p:${purchasedGames}" th:href="@{/store/game/{id}(id=${p.id})}" class="gcard"
               th:attr="data-name=${#strings.toLowerCase(p.name)},data-tags=${p.tags!=null?#strings.toLowerCase(p.tags):''},data-id=${p.id}">
                <button class="favbtn" th:attr="data-id=${p.id}" th:classappend="${favoriteIds.contains(p.id)?'on':''}" th:text="${favoriteIds.contains(p.id)?'&#9829;':'&#9825;'}" onclick="toggleFav(this,event)"></button>
                <img th:src="${p.headerImageUrl}" th:alt="${p.name}" onerror="this.src='https://store.akamai.steamstatic.com/public/images/v6/acct/empty_steamgame_96x96.png'">
                <div class="gbody"><div class="gtitle" th:text="${p.name}"></div><div class="fs-xs muted" th:text="${p.developer}"></div></div>
            </a>
        </div>
    </div>
</div>
<footer><span th:text="#{footer.copy}"></span>  <span th:text="#{footer.disclaimer}"></span></footer>
<script>
var cur='all';
function toggleFav(b,e){e.stopPropagation();e.preventDefault();var id=b.getAttribute('data-id');
fetch('/dashboard/favorite',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'productId='+id}).then(function(r){return r.json()}).then(function(d){
b.classList.toggle('on',d.added);if(d.added){b.innerHTML='&#9829;'}else{b.innerHTML='&#9825;'}updateFav(d.count);if(cur==='favorites')apply();});}
function updateFav(n){document.getElementById('favCount').textContent=n;var b=document.getElementById('favBadge');if(b)b.textContent=n;}
function apply(){
    var cards=document.querySelectorAll('#grid .gcard'),vis=0;
    cards.forEach(function(c){var on=c.querySelector('.favbtn.on');
        if(cur==='all'){c.classList.remove('hidden');vis++;}
        else if(cur==='favorites'){if(on){c.classList.remove('hidden');vis++;}else c.classList.add('hidden');}
        else{var t=c.getAttribute('data-tags')||'';if(t.includes(cur.toLowerCase())){c.classList.remove('hidden');vis++;}else c.classList.add('hidden');}
    });
    var q=document.getElementById('s').value.trim().toLowerCase();if(q)doSearch();
    document.getElementById('noRes').style.display=vis===0?'block':'none';
}
function doSearch(){
    var q=document.getElementById('s').value.trim().toLowerCase(),vis=0;
    document.querySelectorAll('#grid .gcard').forEach(function(c){if(c.classList.contains('hidden'))return;var n=c.getAttribute('data-name')||'';if(!q||n.includes(q)){c.classList.remove('hidden');vis++;}else c.classList.add('hidden');});
    document.getElementById('noRes').style.display=vis===0?'block':'none';
}
(function(){
    document.querySelectorAll('.sbar a[data-filter],.sbar a[data-tag]').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();
        document.querySelectorAll('.sbar a').forEach(function(x){x.classList.remove('on')});a.classList.add('on');
        cur=a.getAttribute('data-filter')||a.getAttribute('data-tag')||'all';apply();});});
    updateFav(document.querySelectorAll('#grid .favbtn.on').length);
})();
</script>
</body>
</html>
