<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css">
    <title th:text="#{register.title} + ' - Steam'">Create Account</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial',sans-serif;background:#1b2838;color:#c6d4df;display:flex;flex-direction:column;min-height:100vh;position:relative;overflow:hidden}
        body::before{content:'';position:fixed;inset:0;background:url('/images/login-bg.png') center center/cover no-repeat;filter:blur(8px) brightness(.75);transform:scale(1.6) rotate(-27deg);z-index:0}
        body>*{position:relative;z-index:1}
        nav{background:#171d25;border-bottom:1px solid #2a475e;padding:.75rem 0}
        .nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:2rem}
        .logo{font-size:1.5rem;font-weight:700;color:#fff;text-decoration:none}
        .logo span{color:#66c0f4}
        nav a{color:#c6d4df;text-decoration:none;font-size:.9rem}
        nav a:hover{color:#66c0f4}
        .nav-right{margin-left:auto}
        .lang-select{background:#2a475e;color:#c6d4df;border:1px solid #4b6a88;padding:.3rem .5rem;border-radius:2px;font-size:.8rem;cursor:pointer}
        .lang-select:focus{outline:none;border-color:#66c0f4}
        .center{flex:1;display:flex;justify-content:center;align-items:center;padding:3rem 20px}
        .card{background:rgba(42,71,94,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
        .card h1{font-size:1.25rem;font-weight:700;color:#fff;margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:.05em}
        .form-group{margin-bottom:1.25rem}
        .form-group label{display:block;font-size:.85rem;color:#c6d4df;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em}
        .form-group input{width:100%;padding:.75rem;background:#1b2838;border:1px solid #4b6a88;color:#c6d4df;font-size:.95rem;border-radius:2px;outline:none}
        .form-group input:focus{border-color:#66c0f4}
        .field-error{color:#f6b4b4;font-size:.8rem;margin-top:.3rem}
        .btn-green{width:100%;padding:.875rem;background:linear-gradient(to bottom,#47810a,#3d6b08);color:#acdbf5;font-weight:700;font-size:1rem;border:none;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
        .btn-green:hover{background:linear-gradient(to bottom,#56980d,#4a7d0a)}
        .alert-error{background:rgba(180,40,40,.15);border:1px solid #c44;color:#f6b4b4;padding:.875rem;border-radius:2px;margin-bottom:1.25rem;font-size:.9rem}
        .link{text-align:center;color:#8f98a0;font-size:.875rem;margin-top:1.25rem}
        .link a{color:#66c0f4;text-decoration:none}
        .link a:hover{text-decoration:underline}
        footer{background:#171d25;border-top:1px solid #2a475e;text-align:center;padding:1.2rem;color:#8f98a0;font-size:.75rem;margin-top:auto}
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>
<div class="center">
    <div class="card">
        <h1 th:text="#{register.title}">Create Account</h1>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <form th:action="@{/register}" method="post" th:object="${registerRequest}">
            <div class="form-group">
                <label for="username" th:text="#{register.username}">Username</label>
                <input type="text" id="username" th:field="*{username}" required autofocus>
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label for="email" th:text="#{register.email}">Email</label>
                <input type="email" id="email" th:field="*{email}" required>
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="form-group">
                <label for="password" th:text="#{register.password}">Password</label>
                <input type="password" id="password" th:field="*{password}" required>
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword" th:text="#{register.confirm}">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required>
                <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn-green" th:text="#{register.submit}">Create My Account</button>
        </form>
        <div class="link">
            <span th:text="#{register.haveaccount}">Already have an account?</span>
            <a href="/login" th:text="#{register.signin}">Sign in</a>
        </div>
    </div>
</div>
<footer>
    <span th:text="#{footer.copy}"></span> &nbsp;·&nbsp; <span th:text="#{footer.disclaimer}"></span>
</footer>
</body>
</html>
