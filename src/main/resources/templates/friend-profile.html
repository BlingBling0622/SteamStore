<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css">
    <link rel="stylesheet" href="/css/steam-nav.css">
    <title th:text="${friendNickname} + ' - Steam'">好友个人资料</title>
    <style>
        body{display:flex;flex-direction:column;min-height:100vh}

        .hero{position:relative;height:300px;background-size:cover;background-position:center 20%;display:flex;align-items:flex-end}
        .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(27,40,56,.96) 0%,rgba(27,40,56,.35) 55%,rgba(27,40,56,.15) 100%)}
        .hero-content{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.5rem 20px;width:100%;display:flex;align-items:flex-end;gap:1.25rem}
        .avatar-lg{width:90px;height:90px;border-radius:50%;border:3px solid #66c0f4;background:#2a475e;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#66c0f4;flex-shrink:0;overflow:hidden}
        .avatar-lg img{width:100%;height:100%;object-fit:cover}
        .hero-info{flex:1;min-width:0}
        .hero-info h1{font-size:1.8rem;color:#fff;font-weight:300}
        .hero-info .sub{font-size:.85rem;color:#8f98a0;margin-top:.2rem}
        .hero-info .sub span{color:#66c0f4}
        .hero-actions{display:flex;gap:.5rem;align-self:flex-start;margin-top:.3rem}
        .btn-action{padding:.55rem 1.3rem;font-size:.82rem;font-weight:700;border:none;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
        .btn-msg{background:#5c7e10;color:#d2e885}
        .btn-msg:hover{background:#6d9314}
        .btn-remove{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);color:#faa}
        .btn-remove:hover{background:rgba(200,20,20,.3);border-color:#c44}

        .content{max-width:1400px;margin:0 auto;padding:0 20px 2rem;width:100%}

        .stats{display:flex;gap:1rem;margin:1.5rem 0}
        .stat-card{flex:1;background:#16202d;padding:1.1rem 1.25rem;border-radius:4px;border:1px solid #000;text-align:center}
        .stat-card .val{font-size:1.4rem;color:#66c0f4;font-weight:300}
        .stat-card .lbl{font-size:.68rem;color:#8f98a0;text-transform:uppercase;margin-top:.15rem;letter-spacing:.04em}

        .profile-grid{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;margin-top:1.5rem}
        .main-col{min-width:0}
        .section-title{font-size:.85rem;color:#fff;font-weight:600;text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.08);letter-spacing:.04em}

        .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
        .game-card{background:#16202d;border-radius:4px;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:all .2s;border:1px solid transparent}
        .game-card:hover{transform:translateY(-2px);border-color:#66c0f4}
        .game-card img{width:100%;height:135px;object-fit:cover;display:block}
        .game-card-body{padding:.65rem .8rem}
        .game-card-body h4{font-size:.85rem;color:#fff;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .game-meta{font-size:.73rem;color:#8f98a0;margin-top:.15rem}

        .side-col{display:flex;flex-direction:column;gap:1rem}
        .side-card{background:#16202d;border:1px solid #000;border-radius:4px;padding:1rem 1.2rem}
        .side-card h3{font-size:.78rem;color:#fff;font-weight:600;text-transform:uppercase;margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:1px solid rgba(255,255,255,.08)}
        .info-row{display:flex;justify-content:space-between;padding:.28rem 0;font-size:.8rem}
        .info-row .k{color:#8f98a0}.info-row .v{color:#c6d4df}

        .back-link{display:inline-block;color:#8f98a0;text-decoration:none;font-size:.82rem;margin:.75rem 0 0;padding:.3rem .6rem;border-radius:2px}
        .back-link:hover{color:#fff;background:rgba(255,255,255,.06)}

        @media(max-width:900px){
            .profile-grid{grid-template-columns:1fr}
            .hero{height:220px}
            .hero-content{flex-direction:column;align-items:center;text-align:center}
            .stats{flex-wrap:wrap}.stat-card{flex:1 1 40%}
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>

<div class="hero" th:style="'background-image:url(' + ${friendBg != null ? friendBg : 'https://cdn.akamai.steamstatic.com/steam/apps/1245620/library_hero.jpg'} + ')'">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="avatar-lg">
            <img th:if="${friendAvatar != null}" th:src="${friendAvatar}" alt="" onerror="this.style.display='none'">
            <span th:unless="${friendAvatar != null}" th:text="${#strings.toUpperCase(friend.username.substring(0,1))}"></span>
        </div>
        <div class="hero-info">
            <h1 th:text="${friendNickname}"></h1>
            <div class="sub" th:text="${friendEmail}"></div>
            <div class="sub">注册时间 <span th:text="${friendSince != null ? #temporals.format(friendSince, 'yyyy 年 MM 月') : '--'}"></span></div>
        </div>
        <div class="hero-actions">
            <a th:href="@{/messages?chat={id}(id=${friend.id})}" class="btn-action btn-msg">发送消息</a>
        </div>
    </div>
</div>

<div class="content">
    <a href="/friends" class="back-link">&larr; 返回好友</a>

    <div class="stats">
        <div class="stat-card"><div class="val" th:text="${friendGameCount}">0</div><div class="lbl">游戏</div></div>
        <div class="stat-card"><div class="val" th:text="${cSym} + ${#numbers.formatDecimal(friendTotalSpent * cRate, 1, cDec)}"></div><div class="lbl">总消费</div></div>
        <div class="stat-card"><div class="val" th:text="${friendCount}">0</div><div class="lbl">好友</div></div>
    </div>

    <div class="profile-grid">
        <div class="main-col">
            <div class="section-title">游戏库 &middot; <span style="color:#8f98a0;font-weight:400" th:text="${friendGameCount} + ' 款游戏'"></span></div>
            <div th:if="${friendGames.isEmpty()}" style="text-align:center;padding:2.5rem;color:#8f98a0">库中暂无游戏</div>
            <div class="games-grid" th:unless="${friendGames.isEmpty()}">
                <a th:each="p : ${friendGames}" th:href="@{/store/game/{id}(id=${p.id})}" class="game-card">
                    <img th:src="${p.headerImageUrl}" th:alt="${p.name}"
                         onerror="this.src='https://store.akamai.steamstatic.com/public/images/v6/acct/empty_steamgame_96x96.png'">
                    <div class="game-card-body">
                        <h4 th:text="${p.name}"></h4>
                        <div class="game-meta" th:text="${p.developer}"></div>
                    </div>
                </a>
            </div>
        </div>

        <div class="side-col">
            <div class="side-card">
                <h3>详细信息</h3>
                <div class="info-row"><span class="k">用户名</span><span class="v" th:text="${friend.username}"></span></div>
                <div class="info-row"><span class="k">昵称</span><span class="v" th:text="${friendNickname}"></span></div>
                <div class="info-row"><span class="k">加入时间</span><span class="v" th:text="${friendSince != null ? #temporals.format(friendSince, 'yyyy 年 MM 月') : '--'}"></span></div>
                <div th:if="${friendSteamId != null}" class="info-row"><span class="k">Steam ID</span><span class="v" th:text="${friendSteamId}" style="font-size:.72rem"></span></div>
            </div>

            <div class="side-card">
                <h3>操作</h3>
                <a th:href="@{/messages?chat={id}(id=${friend.id})}" style="display:block;color:#66c0f4;text-decoration:none;font-size:.82rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04)">发送消息</a>
                <form th:action="@{/friends/remove}" method="post" style="display:inline"
                      onsubmit="return confirm('确认删除该好友？')">
                    <input type="hidden" name="friendId" th:value="${friend.id}">
                    <button type="submit" style="background:none;border:none;color:#f88;cursor:pointer;font-size:.82rem;padding:.3rem 0;display:block;width:100%;text-align:left">删除好友</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer><span th:text="#{footer.copy}"></span> &copy; 2026 Steam Store &nbsp;&middot;&nbsp;  <span th:text="#{footer.disclaimer}"></span></footer>
</body>
</html>
