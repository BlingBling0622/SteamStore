<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam 商店</title>
<link rel="stylesheet" href="/css/steam.css">
<link rel="stylesheet" href="/css/steam-nav.css">
<style>
/* Carousel - KEPT AS-IS */
.hero{background:linear-gradient(to bottom,#2a475e,#1b2838);border-bottom:1px solid #2a475e}
.hero-inner{max-width:1400px;margin:0 auto;padding:2rem 20px}
.section-label{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.section-label a{color:var(--accent);text-decoration:none;font-size:.8rem}
.carousel-wrapper{position:relative;display:flex;align-items:center;justify-content:center;height:300px;overflow:hidden;perspective:1000px}
.carousel-slide{position:absolute;width:70%;height:100%;border-radius:6px;overflow:hidden;text-decoration:none;transition:all .55s cubic-bezier(.23,1,.32,1);cursor:pointer}
.carousel-slide img{width:100%;height:100%;object-fit:cover;display:block}
.carousel-slide .slide-info{position:absolute;bottom:0;left:0;right:0;padding:.8rem 1rem;background:linear-gradient(transparent,rgba(0,0,0,.9));transition:opacity .35s}
.carousel-slide .slide-info h3{font-size:1.1rem;color:var(--white);font-weight:700;margin-bottom:.2rem}
.carousel-slide.prev{transform:translateX(-44%) scale(.8);opacity:.4;z-index:1;filter:brightness(.55)}
.carousel-slide.active{transform:translateX(0) scale(1);opacity:1;z-index:3;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.carousel-slide.next{transform:translateX(44%) scale(.8);opacity:.4;z-index:1;filter:brightness(.55)}
.carousel-slide.hidden{transform:translateX(0) scale(.7);opacity:0;z-index:0;pointer-events:none}
.carousel-slide.prev .slide-info,.carousel-slide.next .slide-info{opacity:0}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;background:rgba(0,0,0,.5);border:none;color:var(--white);font-size:1.4rem;cursor:pointer;z-index:10;border-radius:50%;transition:all .2s;display:flex;align-items:center;justify-content:center}
.carousel-arrow:hover{background:rgba(103,193,245,.6);transform:translateY(-50%) scale(1.1)}
.carousel-prev{left:0}.carousel-next{right:0}
.carousel-dots{display:flex;justify-content:center;gap:.5rem;margin-top:1rem}
.carousel-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.25);border:none;cursor:pointer;transition:all .25s}
.carousel-dot.active{background:var(--accent);transform:scale(1.35)}
.section{max-width:1400px;margin:2rem auto;padding:0 20px;width:100%}
.ggrid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem}
.gcard img{height:100px}
@media(max-width:768px){.carousel-wrapper{height:200px}.carousel-slide{width:90%}.carousel-slide.prev{transform:translateX(-52%) scale(.85)}.carousel-slide.next{transform:translateX(52%) scale(.85)}}
</style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>

<div class="hero">
    <div class="hero-inner">
        <div class="section-label"><span>精选 &amp; 推荐</span><span id="carouselCounter"></span></div>
        <div class="carousel-wrapper" id="carouselWrapper">
            <button class="carousel-arrow carousel-prev" onclick="changeSlide(-1);event.stopPropagation()">&#10094;</button>
            <button class="carousel-arrow carousel-next" onclick="changeSlide(1);event.stopPropagation()">&#10095;</button>
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
    </div>
</div>

<div class="section">
    <div class="section-label">
        <span th:text="#{store.browse}">Browse the Store</span>
        <a href="/store" th:text="#{store.seeall}">See all &rarr;</a>
    </div>
    <div class="ggrid">
        <a class="gcard" th:each="p : ${allProducts}" th:href="@{/store/game/{id}(id=${p.id})}">
            <img th:src="${p.headerImageUrl}" th:alt="${p.name}" onerror="this.src='https://store.akamai.steamstatic.com/public/images/v6/acct/empty_steamgame_96x96.png'">
            <div class="gbody">
                <div class="gtitle" th:text="${p.name}"></div>
                <div class="flex gap2" style="align-items:center;margin-top:.3rem">
                    <span class="gdisc" th:if="${p.discountPercent > 0}" th:text="'-' + ${p.discountPercent} + '%'"></span>
                    <span class="gold" th:if="${p.discountPercent > 0}" th:text="${cSym} + ${#numbers.formatDecimal(p.price * cRate, 1, cDec)}"></span>
                    <span class="gfree" th:if="${p.price == 0}">免费</span>
                    <span class="gcur" th:if="${p.price > 0 and p.discountPercent > 0}" th:text="${cSym} + ${#numbers.formatDecimal(p.price * (1 - p.discountPercent / 100.0) * cRate, 1, cDec)}"></span>
                    <span class="gcur" th:if="${p.price > 0 and p.discountPercent == 0}" th:text="${cSym} + ${#numbers.formatDecimal(p.price * cRate, 1, cDec)}"></span>
                </div>
            </div>
        </a>
    </div>
</div>

<div id="allGamesData" class="hidden">
    <span class="gd-item" th:each="p : ${allProducts}" th:data-id="${p.id}" th:data-name="${p.name}" th:data-img="${p.screenshot1Url != null ? p.screenshot1Url : p.headerImageUrl}" th:data-tags="${p.tags}"></span>
</div>

<footer><span th:text="#{footer.copy}"></span> &nbsp;&middot;&nbsp; <span th:text="#{footer.disclaimer}"></span></footer>

<script>
var carouselGames = [], carouselIdx = 0, carouselTimer = null;
(function initCarousel() {
    var items = document.querySelectorAll('#allGamesData .gd-item'), games = [];
    for (var i = 0; i < items.length; i++) {
        games.push({id: parseInt(items[i].getAttribute('data-id')), name: items[i].getAttribute('data-name'), img: items[i].getAttribute('data-img'), tags: items[i].getAttribute('data-tags') || ''});
    }
    if (games.length < 4) return;
    for (var i = games.length - 1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=games[i];games[i]=games[j];games[j]=t; }
    carouselGames = games.slice(0, 4);
    var wrapper = document.getElementById('carouselWrapper');
    for (var i = 0; i < carouselGames.length; i++) {
        var g = carouselGames[i], tagsHtml = '';
        if (g.tags) { var ta = g.tags.split(','); for (var t=0;t<ta.length;t++) tagsHtml += '<span class="tag" style="background:rgba(103,193,245,.15);color:#66c0f4;padding:.2rem .6rem;border-radius:2px;font-size:.75rem;margin-right:.4rem">'+ta[t].trim()+'</span>'; }
        var slide = document.createElement('a'); slide.className = 'carousel-slide hidden'; slide.href = '/store/game/' + g.id; slide.setAttribute('data-index', i);
        slide.innerHTML = '<img src="'+g.img+'" alt="'+g.name+'"><div class="slide-info"><h3>'+g.name+'</h3><div>'+tagsHtml+'</div></div>';
        wrapper.insertBefore(slide, wrapper.firstChild);
    }
    var dotsHtml = '';
    for (var d = 0; d < carouselGames.length; d++) dotsHtml += '<button class="carousel-dot'+ (d===0?' active':'') +'" onclick="showSlide('+d+')"></button>';
    document.getElementById('carouselDots').innerHTML = dotsHtml;
    document.getElementById('carouselCounter').textContent = '1 / 4';
    showSlide(0); startAutoPlay();
})();
function showSlide(idx) {
    carouselIdx = idx;
    document.querySelectorAll('.carousel-slide').forEach(function(s){ s.className = 'carousel-slide hidden'; });
    var prev = (idx - 1 + carouselGames.length) % carouselGames.length, next = (idx + 1) % carouselGames.length;
    document.querySelectorAll('.carousel-slide')[prev].className = 'carousel-slide prev';
    document.querySelectorAll('.carousel-slide')[idx].className = 'carousel-slide active';
    document.querySelectorAll('.carousel-slide')[next].className = 'carousel-slide next';
    document.querySelectorAll('.carousel-dot').forEach(function(d,i){ d.classList.toggle('active', i===idx); });
    document.getElementById('carouselCounter').textContent = (idx+1) + ' / ' + carouselGames.length;
}
function changeSlide(dir) {
    var idx = carouselIdx + dir;
    if (idx < 0) idx = carouselGames.length - 1;
    if (idx >= carouselGames.length) idx = 0;
    showSlide(idx); resetAutoPlay();
}
function startAutoPlay() { carouselTimer = setInterval(function(){ changeSlide(1); }, 4500); }
function resetAutoPlay() { clearInterval(carouselTimer); startAutoPlay(); }
</script>
</body>
</html>
