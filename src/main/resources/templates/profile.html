<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css">
<title th:text="${user.username}+' - Profile'">Profile</title>
<style>
.hero{position:relative;height:320px;background-size:cover;background-position:center 20%;display:flex;align-items:flex-end}
.hero .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(27,40,56,.96) 0%,rgba(27,40,56,.3) 55%,rgba(27,40,56,.1) 100%)}
.hero .hc{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.5rem 20px;width:100%;display:flex;align-items:flex-end;gap:1rem}
.av-lg{width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);background:var(--border1);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden}
.av-lg img{width:100%;height:100%;object-fit:cover}
.hero h1{font-size:1.6rem;color:var(--white);font-weight:300}.hero .sub{font-size:.82rem;color:var(--muted);margin-top:.15rem}
.content{max-width:1400px;margin:0 auto;padding:0 20px 2rem;flex:1;width:100%}
.grid2{display:grid;grid-template-columns:1fr 300px;gap:2rem;margin-top:1.5rem}
</style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>
<div class="hero" th:style="'background-image:url(' + ${user.profileBackgroundUrl!=null ? user.profileBackgroundUrl : 'https://cdn.akamai.steamstatic.com/steam/apps/1245620/library_hero.jpg'} + ')'">
    <div class="ov"></div><div class="hc">
        <div class="av-lg"><img th:if="${user.avatarUrl!=null}" th:src="${user.avatarUrl}" alt="" onerror="this.style.display='none'"><span th:unless="${user.avatarUrl!=null}" th:text="${#strings.toUpperCase(user.username.substring(0,1))}"></span></div>
        <div class="flex1"><h1 th:text="${user.nickname!=null?user.nickname:user.username}"></h1><div class="sub" th:text="${user.email}"></div><div class="sub"><span th:text="#{profile.membersince}">Member since</span> <span class="accent" th:text="${memberSince!=null?#temporals.format(memberSince,'MMMM yyyy'):'--'}"></span></div></div>
        <a href="/profile/edit" class="btn btn-b" th:text="#{profile.edit}">Edit Profile</a>
    </div>
</div>
<div class="content">
    <div th:if="${success}" class="alert alert-ok" th:text="${success}"></div>
    <div class="stats">
        <div class="stat"><div class="v" th:text="${gameCount}">0</div><div class="l" th:text="#{profile.games}">Games</div></div>
        <div class="stat"><div class="v" th:text="${cSym}+${#numbers.formatDecimal(totalSpent*cRate,1,cDec)}"></div><div class="l" th:text="#{profile.spent}">Spent</div></div>
        <div class="stat"><div class="v" th:text="${friendsCount}">0</div><div class="l" th:text="#{profile.friends}">Friends</div></div>
        <div class="stat"><div class="v" th:text="${groupCount}">0</div><div class="l" th:text="#{profile.groups}">Groups</div></div>
        <div class="stat"><div class="v fs-sm" th:text="${steamLinked?'Linked':'--'}"></div><div class="l" th:text="#{profile.steam}">Steam</div></div>
    </div>
    <div class="grid2">
        <div>
            <h3 style="font-size:.85rem;color:var(--white);text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.08)"><span th:text="#{profile.gamelib}">Game Library</span> &middot; <span class="muted" style="font-weight:400" th:text="${gameCount}+' games'"></span></h3>
            <div th:if="${purchasedGames.isEmpty()}" style="text-align:center;padding:2rem;color:var(--muted)"><span th:text="#{profile.nogames}">No games yet.</span> <a href="/store" th:text="#{profile.browseStore}">Browse Store</a></div>
            <div class="ggrid" th:unless="${purchasedGames.isEmpty()}">
                <a th:each="p:${purchasedGames}" th:href="@{/store/game/{id}(id=${p.id})}" class="gcard">
                    <img th:src="${p.headerImageUrl}" th:alt="${p.name}" onerror="this.src='https://store.akamai.steamstatic.com/public/images/v6/acct/empty_steamgame_96x96.png'">
                    <div class="gbody"><div class="gtitle" th:text="${p.name}"></div><div class="fs-xs muted" th:text="${p.developer}"></div></div>
                </a>
            </div>
        </div>
        <div class="flex col gap1">
            <div class="card"><h3 th:text="#{profile.steam}">Steam</h3>
                <div th:if="${steamLinked}"><div style="color:var(--green2);font-size:.82rem"><span th:text="#{profile.steamLinked}">Linked as</span> <strong th:text="${steamAccount.personaName}"></strong></div></div>
                <div th:unless="${steamLinked}"><p class="fs-sm muted mb1" th:text="#{profile.steamdesc}">Link your Steam account to sync your library</p><a href="/auth/steam/login" class="btn btn-b" th:text="#{profile.connectSteam}">Connect Steam</a></div>
            </div>
            <div class="card"><h3 th:text="#{profile.details}">Details</h3>
                <div class="flex" style="justify-content:space-between;padding:.25rem 0;font-size:.8rem"><span class="muted" th:text="#{profile.username}">Username</span><span th:text="${user.username}"></span></div>
                <div class="flex" style="justify-content:space-between;padding:.25rem 0;font-size:.8rem"><span class="muted" th:text="#{profile.nickname}">Nickname</span><span th:text="${user.nickname!=null?user.nickname:'--'}"></span></div>
                <div class="flex" style="justify-content:space-between;padding:.25rem 0;font-size:.8rem"><span class="muted" th:text="#{profile.email}">Email</span><span th:text="${user.email}" style="font-size:.75rem"></span></div>
                <div class="flex" style="justify-content:space-between;padding:.25rem 0;font-size:.8rem"><span class="muted" th:text="#{profile.joined}">Joined</span><span th:text="${memberSince!=null?#temporals.format(memberSince,'MMM yyyy'):'--'}"></span></div>
            </div>
            <div class="card"><h3 th:text="#{profile.social}">Social</h3>
                <a href="/friends" class="flex" style="justify-content:space-between;padding:.3rem 0;color:var(--text);border-bottom:1px solid rgba(255,255,255,.04)">
                    <span th:text="#{profile.friends}">Friends</span><span class="accent" th:text="${friendsCount}">0</span></a>
                <a href="/groups" class="flex" style="justify-content:space-between;padding:.3rem 0;color:var(--text);border-bottom:1px solid rgba(255,255,255,.04)">
                    <span th:text="#{profile.groups}">Groups</span><span class="accent" th:text="${groupCount}">0</span></a>
                <a href="/messages" class="flex" style="justify-content:space-between;padding:.3rem 0;color:var(--text)">
                    <span th:text="#{nav.messages}">Messages</span></a>
            </div>
        </div>
    </div>
</div>
<footer><span th:text="#{footer.copy}"></span> &middot; <span th:text="#{footer.disclaimer}"></span></footer>
</body>
</html>
