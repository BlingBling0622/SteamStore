<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购买完成 - Steam</title>
    <link rel="stylesheet" href="/css/steam-nav.css">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial',sans-serif;background:#1b2838;color:#c6d4df;display:flex;flex-direction:column;min-height:100vh}
        nav{background:#171d25;border-bottom:1px solid #2a475e;padding:.75rem 0}
        .nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:1.5rem}
        .logo{font-size:1.5rem;font-weight:700;color:#fff;text-decoration:none}
        .logo span{color:#66c0f4}
        .nav-right{margin-left:auto}
        .lang-select{background:#2a475e;color:#c6d4df;border:1px solid #4b6a88;padding:.3rem .5rem;border-radius:2px;font-size:.8rem;cursor:pointer}
        .lang-select:focus{outline:none;border-color:#66c0f4}
        .main{max-width:700px;margin:3rem auto;padding:0 20px;flex:1;width:100%}
        .success-box{background:#2a475e;border:1px solid #4b6a88;border-radius:4px;padding:2.5rem;text-align:center}
        .check{font-size:3rem;margin-bottom:1rem}
        .success-box h1{font-size:1.5rem;color:#a4d007;font-weight:700;margin-bottom:.5rem}
        .success-box p{color:#8f98a0;font-size:.95rem;margin-bottom:2rem}
        .order-items{text-align:left;background:#1b2838;border:1px solid #2a475e;border-radius:3px;overflow:hidden;margin-bottom:1.5rem}
        .order-item{display:flex;gap:1rem;align-items:center;padding:.875rem 1rem;border-bottom:1px solid #2a475e}
        .order-item:last-child{border-bottom:none}
        .order-item img{width:100px;height:37px;object-fit:cover;border-radius:2px;flex-shrink:0}
        .order-item-name{flex:1;color:#fff;font-size:.9rem;font-weight:700}
        .total-row{text-align:right;color:#8f98a0;font-size:.9rem;padding:.75rem 1rem}
        .total-row strong{color:#acdbf5;font-size:1.1rem}
        .btn-lib{display:inline-block;padding:.875rem 2rem;background:linear-gradient(to bottom,#47810a,#3d6b08);color:#acdbf5;font-weight:700;font-size:.95rem;border-radius:2px;text-decoration:none;text-transform:uppercase;margin-right:.75rem}
        .btn-lib:hover{background:linear-gradient(to bottom,#56980d,#4a7d0a)}
        .btn-store{display:inline-block;padding:.875rem 2rem;background:linear-gradient(to bottom,#2a475e,#1b3a4f);color:#66c0f4;font-weight:700;font-size:.95rem;border:1px solid #4b6a88;border-radius:2px;text-decoration:none;text-transform:uppercase}
        footer{background:#171d25;border-top:1px solid #2a475e;text-align:center;padding:1.2rem;color:#8f98a0;font-size:.75rem;margin-top:auto}
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>
<div class="main">
    <div class="success-box">
        <div class="check">✓</div>
        <h1 th:text="#{checkout.thanks}">Thank you for your purchase!</h1>
        <p th:text="#{checkout.subtitle}">Your games have been added to your library.</p>
        <div class="order-items">
            <div class="order-item" th:each="p : ${order.products}">
                <img th:src="${p.headerImageUrl}" th:alt="${p.name}">
                <span class="order-item-name" th:text="${p.name}"></span>
            </div>
            <div class="total-row">
                <span th:text="#{checkout.total}">Total charged:</span>
                <strong th:text="${cSym} + ${#numbers.formatDecimal(order.total * cRate, 1, cDec)}"></strong>
            </div>
        </div>
        <a href="/dashboard" class="btn-lib" th:text="#{checkout.tolibrary}">Go to Library</a>
        <a href="/store" class="btn-store" th:text="#{checkout.continue}">Continue Shopping</a>
    </div>
</div>
<footer>
    <span th:text="#{footer.copy}"></span> &nbsp;·&nbsp; <span th:text="#{footer.disclaimer}"></span>
</footer>
</body>
</html>
