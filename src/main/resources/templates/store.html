<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{nav.store} + ' - Steam'">Store</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial',sans-serif;background:#1b2838;color:#c6d4df}
        nav{background:#171d25;border-bottom:1px solid #2a475e;padding:.75rem 0;position:sticky;top:0;z-index:100}
        .nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:1.5rem}
        .logo{font-size:1.5rem;font-weight:700;color:#fff;text-decoration:none;margin-right:1rem}
        .logo span{color:#66c0f4}
        .nav-inner a{color:#c6d4df;text-decoration:none;font-size:.9rem;padding:.4rem .75rem;border-radius:2px}
        .nav-inner a:hover,.nav-inner a.active{color:#fff;background:rgba(255,255,255,.1)}
        .nav-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
        .btn-lib{padding:.4rem 1rem;background:linear-gradient(to bottom,#2a475e,#1b3a4f);color:#66c0f4;font-size:.85rem;font-weight:700;border:1px solid #4b6a88;border-radius:2px;text-decoration:none}
        .cart-btn{color:#66c0f4;text-decoration:none;font-size:.9rem}
        .lang-select{background:#2a475e;color:#c6d4df;border:1px solid #4b6a88;padding:.3rem .5rem;border-radius:2px;font-size:.8rem;cursor:pointer}
        .lang-select:focus{outline:none;border-color:#66c0f4}
        .main{max-width:1200px;margin:2rem auto;padding:0 20px}
        .page-header{margin-bottom:1.5rem;border-bottom:1px solid #2a475e;padding-bottom:1rem}
        .page-header h1{font-size:1.5rem;color:#fff;font-weight:700}
        .page-header p{color:#8f98a0;font-size:.875rem;margin-top:.25rem}
        .game-list{display:flex;flex-direction:column;gap:1px;background:#2a475e}
        .game-row{display:flex;background:#1b2838;text-decoration:none;color:inherit;transition:background .15s}
        .game-row:hover{background:#2a475e}
        .game-row img{width:184px;height:69px;object-fit:cover;flex-shrink:0}
        .game-row-info{flex:1;padding:.75rem 1rem;display:flex;align-items:center;gap:1rem}
        .game-row-name{flex:1;color:#fff;font-weight:700;font-size:.95rem}
        .game-row-tags{flex:1;display:flex;gap:.3rem;flex-wrap:wrap}
        .tag{background:rgba(103,193,245,.1);color:#66c0f4;padding:.15rem .5rem;border-radius:2px;font-size:.75rem}
        .game-row-review{width:160px;font-size:.8rem;flex-shrink:0}
        .review-pos{color:#66c0f4}
        .review-overwhelm{color:#a4d007}
        .game-row-price{width:130px;text-align:right;flex-shrink:0}
        .badge-discount{display:inline-block;background:#4c6b22;color:#a4d007;padding:.15rem .4rem;border-radius:2px;font-size:.75rem;font-weight:700;margin-bottom:.2rem}
        .price-old{text-decoration:line-through;color:#8f98a0;font-size:.75rem;display:block}
        .price-new{color:#acdbf5;font-size:.9rem;font-weight:700}
        .price-free{color:#a4d007;font-size:.9rem;font-weight:700}
        footer{background:#171d25;border-top:1px solid #2a475e;padding:2rem 20px;text-align:center;color:#8f98a0;font-size:.8rem;margin-top:3rem}
        @media(max-width:768px){.game-row-tags,.game-row-review{display:none}.game-row img{width:120px;height:45px}}
    </style>
</head>
<body>
<nav>
    <div class="nav-inner">
        <a href="/" class="logo">STEAM<span>STORE</span></a>
        <a href="/store" class="active" th:text="#{nav.store}">Store</a>
        <div class="nav-right">
            <a href="/dashboard" class="btn-lib" th:text="#{nav.library}">Library</a>
            <a href="/cart" class="cart-btn">🛒 <span th:text="#{nav.cart}">Cart</span>
                <span th:if="${cartCount != null and cartCount > 0}" th:text="'(' + ${cartCount} + ')'"></span>
            </a>
            <select class="lang-select" onchange="window.location.href='?lang='+this.value">
                <option value="en" th:selected="${currentLang == 'en'}">EN</option>
                <option value="ja" th:selected="${currentLang == 'ja'}">日本語</option>
                <option value="ko" th:selected="${currentLang == 'ko'}">한국어</option>
                <option value="fr" th:selected="${currentLang == 'fr'}">FR</option>
                <option value="de" th:selected="${currentLang == 'de'}">DE</option>
                <option value="ru" th:selected="${currentLang == 'ru'}">RU</option>
                <option value="es" th:selected="${currentLang == 'es'}">ES</option>
                <option value="zh" th:selected="${currentLang == 'zh'}">中文</option>
            </select>
        </div>
    </div>
</nav>
<div class="main">
    <div class="page-header">
        <h1 th:text="#{store.allgames}">All Games</h1>
        <p th:text="${products.size()} + ' ' + #{store.results}"></p>
    </div>
    <div class="game-list">
        <a class="game-row" th:each="p : ${products}" th:href="@{/store/game/{id}(id=${p.id})}">
            <img th:src="${p.headerImageUrl}" th:alt="${p.name}">
            <div class="game-row-info">
                <span class="game-row-name" th:text="${p.name}"></span>
                <div class="game-row-tags">
                    <span class="tag" th:each="tag : ${#strings.arraySplit(p.tags, ',')}" th:text="${#strings.trim(tag)}"></span>
                </div>
                <div class="game-row-review">
                    <span class="review-overwhelm" th:if="${p.reviewSummary != null and #strings.contains(p.reviewSummary,'Overwhelmingly')}" th:text="${p.reviewSummary}"></span>
                    <span class="review-pos"        th:if="${p.reviewSummary != null and !#strings.contains(p.reviewSummary,'Overwhelmingly')}" th:text="${p.reviewSummary}"></span>
                </div>
                <div class="game-row-price">
                    <span class="badge-discount" th:if="${p.discountPercent > 0}" th:text="'-' + ${p.discountPercent} + '%'"></span>
                    <span class="price-old"  th:if="${p.discountPercent > 0}"
                          th:text="${cSym} + ${#numbers.formatDecimal(p.price * cRate, 1, cDec)}"></span>
                    <span class="price-free" th:if="${p.price == 0}" th:text="#{store.free}">Free</span>
                    <span class="price-new"  th:if="${p.price > 0 and p.discountPercent > 0}"
                          th:text="${cSym} + ${#numbers.formatDecimal(p.price * (1 - p.discountPercent / 100.0) * cRate, 1, cDec)}"></span>
                    <span class="price-new"  th:if="${p.price > 0 and p.discountPercent == 0}"
                          th:text="${cSym} + ${#numbers.formatDecimal(p.price * cRate, 1, cDec)}"></span>
                </div>
            </div>
        </a>
    </div>
</div>
<footer>
    <span th:text="#{footer.copy}"></span> &nbsp;·&nbsp; <span th:text="#{footer.disclaimer}"></span>
</footer>
</body>
</html>
