<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑个人资料</title>
    <link rel="stylesheet" href="/css/steam-nav.css">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial',sans-serif;background:#1b2838;color:#c6d4df;min-height:100vh}
        .content{max-width:700px;margin:3rem auto;padding:0 20px}
        .card{background:#16202d;border:1px solid #000;border-radius:4px;padding:1.5rem 2rem;margin-bottom:1.5rem}
        .card h2{font-size:1rem;color:#fff;font-weight:600;text-transform:uppercase;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.5rem}
        .card h2 .icon{font-size:1.2rem}
        .row{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap}
        .row>div{flex:1;min-width:200px}
        .row>div.small{flex:0 0 160px;min-width:140px}
        label{display:block;font-size:.8rem;color:#8f98a0;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.04em}
        input[type="text"],input[type="url"]{width:100%;padding:.55rem .7rem;background:#1b2838;border:1px solid #4b6a88;color:#c6d4df;border-radius:2px;font-size:.9rem}
        input:focus{outline:none;border-color:#66c0f4}
        input[type="file"]{color:#c6d4df;font-size:.85rem;width:100%}
        .btn{padding:.55rem 1.2rem;font-size:.85rem;font-weight:700;border:none;border-radius:2px;cursor:pointer;white-space:nowrap}
        .btn-green{background:linear-gradient(to bottom,#47810a,#3d6b08);color:#acdbf5}
        .btn-green:hover{background:linear-gradient(to bottom,#56980d,#4a7d0a)}
        .btn-blue{background:#2a475e;color:#66c0f4;border:1px solid #4b6a88}
        .btn-blue:hover{background:#316282}
        .btn-save{width:100%;padding:.75rem;background:linear-gradient(to bottom,#47810a,#3d6b08);color:#acdbf5;font-weight:700;font-size:1rem;border:none;border-radius:2px;cursor:pointer;text-transform:uppercase}
        .btn-save:hover{background:linear-gradient(to bottom,#56980d,#4a7d0a)}
        .btn-back{display:inline-block;padding:.5rem 1.2rem;background:#2a475e;color:#66c0f4;font-size:.85rem;font-weight:700;border:1px solid #4b6a88;border-radius:2px;cursor:pointer;text-decoration:none;margin-bottom:1.5rem}
        .btn-back:hover{background:#316282}
        .preview-box{width:64px;height:64px;border-radius:4px;object-fit:cover;background:#1b2838;flex-shrink:0}
        .preview-bg{width:100%;height:70px;border-radius:4px;object-fit:cover;background:#1b2838;margin-top:.5rem}
        .preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-top:.75rem}
        .preset-card{border:2px solid transparent;border-radius:4px;overflow:hidden;cursor:pointer;transition:.15s}
        .preset-card:hover,.preset-card.sel{border-color:#66c0f4}
        .preset-card img{width:100%;height:65px;object-fit:cover;display:block}
        .preset-card span{display:block;padding:.3rem;font-size:.7rem;color:#8f98a0;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .alert{padding:.75rem 1rem;border-radius:2px;margin-bottom:1rem;font-size:.9rem}
        .alert-success{background:rgba(74,126,22,.15);border:1px solid #4a7e16;color:#a4d007}
        .alert-error{background:rgba(180,40,40,.15);border:1px solid #c44;color:#f6b4b4}
        footer{background:#171d25;border-top:1px solid #2a475e;text-align:center;padding:1.2rem;color:#8f98a0;font-size:.75rem;margin-top:auto}
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>

<div class="content">
    <a href="/profile" class="btn-back">返回个人资料</a>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Nickname -->
    <div class="card">
        <h2> 昵称</h2>
        <form th:action="@{/profile/edit}" method="post">
            <div class="row">
                <div>
                    <input type="text" name="nickname" th:value="${user.nickname}" th:placeholder="${user.username}">
                </div>
                <div class="small">
                    <button type="submit" class="btn btn-green" style="width:100%">保存</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Avatar: URL + Upload integrated -->
    <div class="card">
        <h2> 头像</h2>
        <div class="row" style="align-items:center;margin-bottom:.75rem">
            <img class="preview-box" th:src="${user.avatarUrl != null ? user.avatarUrl : 'https://store.akamai.steamstatic.com/public/images/v6/acct/empty_steamgame_96x96.png'}" id="avatarPreview" onerror="this.src='https://store.akamai.steamstatic.com/public/images/v6/acct/empty_steamgame_96x96.png'">
            <span style="font-size:.8rem;color:#8f98a0">当前头像</span>
            <form th:if="${user.avatarUrl != null}" th:action="@{/profile/clear-avatar}" method="post" style="margin-left:auto">
                <button type="submit" class="btn btn-blue" style="font-size:.75rem;padding:.3rem .8rem">移除</button>
            </form>
        </div>
        <div class="row">
            <div>
                <label>头像 URL</label>
                <form th:action="@{/profile/edit}" method="post" style="display:flex;gap:.5rem">
                    <input type="url" name="avatarUrl" th:value="${user.avatarUrl}" placeholder="https://..." style="flex:1">
                    <button type="submit" class="btn btn-green">保存 URL</button>
                </form>
            </div>
            <div class="small">
                <label>或上传</label>
                <form th:action="@{/profile/upload-avatar}" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" accept="image/*" style="margin-bottom:.3rem">
                    <button type="submit" class="btn btn-blue" style="width:100%">上传图片</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Background: URL + Upload + Purchased Games -->
    <div class="card">
        <h2> 个人资料背景</h2>
        <div class="row" style="align-items:center;margin-bottom:.75rem">
            <img class="preview-bg" id="bgPreview" th:src="${user.profileBackgroundUrl}" th:if="${user.profileBackgroundUrl != null}" onerror="this.style.display='none'" style="width:100%;height:60px;border-radius:4px;object-fit:cover;background:#1b2838;flex:1">
            <span th:unless="${user.profileBackgroundUrl != null}" style="font-size:.8rem;color:#8f98a0">未设置背景</span>
            <form th:if="${user.profileBackgroundUrl != null}" th:action="@{/profile/clear-background}" method="post" style="margin-left:auto">
                <button type="submit" class="btn btn-blue" style="font-size:.75rem;padding:.3rem .8rem">移除</button>
            </form>
        </div>
        <div class="row" style="margin-top:.75rem">
            <div>
                <label>背景 URL</label>
                <form th:action="@{/profile/edit}" method="post" style="display:flex;gap:.5rem">
                    <input type="url" name="backgroundUrl" id="bgUrlInput" th:value="${user.profileBackgroundUrl}" placeholder="https://..." style="flex:1">
                    <button type="submit" class="btn btn-green">保存 URL</button>
                </form>
            </div>
            <div class="small">
                <label>或上传</label>
                <form th:action="@{/profile/upload-background}" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" accept="image/*" style="margin-bottom:.3rem">
                    <button type="submit" class="btn btn-blue" style="width:100%">上传图片</button>
                </form>
            </div>
        </div>

        <!-- Purchased game backgrounds -->
        <label style="margin-top:1rem">你的游戏</label>
        <div class="preset-grid" th:if="${!purchasedScreenshots.isEmpty()}">
            <form th:action="@{/profile/background}" method="post" class="preset-card" th:each="bg : ${purchasedScreenshots}">
                <input type="hidden" name="backgroundUrl" th:value="${bg}">
                <button type="submit" style="border:none;background:none;padding:0;cursor:pointer;width:100%;text-align:left">
                    <img th:src="${bg}" alt="" onerror="this.parentElement.parentElement.style.display='none'">
                </button>
            </form>
        </div>
        <p th:if="${purchasedScreenshots.isEmpty()}" style="font-size:.85rem;color:#8f98a0;margin-top:.5rem">从商店购买游戏可解锁更多背景选项。</p>
    </div>
</div>

<footer><span th:text="#{footer.copy}"></span> &nbsp;·&nbsp; <span th:text="#{footer.disclaimer}"></span></footer>
</body>
</html>
