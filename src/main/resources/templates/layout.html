<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - Steam Library App' : 'Steam Library App'}">Steam Library App</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F6F1E8;
            color: #1F2421;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            background: rgba(251, 247, 239, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #E2D9C8;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 20px;
        }

        nav .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1F2421;
            text-decoration: none;
        }

        nav .logo span {
            color: #C8853F;
            font-style: italic;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: #1F2421;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #C8853F;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #C8853F;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            background-color: #A86B2C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 133, 63, 0.3);
        }

        .btn-secondary {
            background-color: #FBF7EF;
            color: #1F2421;
            border: 2px solid #E2D9C8;
        }

        .btn-secondary:hover {
            background-color: #F0E3D0;
            border-color: #C8853F;
        }

        /* Alert Messages */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Card */
        .card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 12px rgba(42, 39, 35, 0.08);
            margin-bottom: 2rem;
        }

        /* Footer */
        footer {
            background-color: #2A2723;
            color: #F6F1E8;
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
        }

        footer a {
            color: #C8853F;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
    <th:block th:insert="${additionalStyles}"/>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">Steam<span>Library</span></a>
            <ul>
                <li th:if="${#authorization.expression('isAuthenticated()')}">
                    <a href="/dashboard">Dashboard</a>
                </li>
                <li th:if="${!#authorization.expression('isAuthenticated()')}">
                    <a href="/login">Login</a>
                </li>
                <li th:if="${!#authorization.expression('isAuthenticated()')}">
                    <a href="/register" class="btn">Get Started</a>
                </li>
                <li th:if="${#authorization.expression('isAuthenticated()')}">
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <main th:fragment="content">
        <!-- Content will be inserted here -->
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Steam Library App. Built with Spring Boot.</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem; color: #8A8A80;">
                Not affiliated with Valve Corporation or Steam.
            </p>
        </div>
    </footer>
</body>
</html>
