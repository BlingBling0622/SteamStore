<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' on Steam'">Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial',sans-serif;background:#1b2838;color:#c6d4df}
        nav{background:#171d25;border-bottom:1px solid #2a475e;padding:.75rem 0;position:sticky;top:0;z-index:100}
        .nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:1.5rem}
        .logo{font-size:1.5rem;font-weight:700;color:#fff;text-decoration:none;margin-right:1rem}
        .logo span{color:#66c0f4}
        .nav-inner a{color:#c6d4df;text-decoration:none;font-size:.9rem;padding:.4rem .75rem;border-radius:2px}
        .nav-inner a:hover{color:#fff;background:rgba(255,255,255,.1)}
        .nav-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
        .cart-btn{color:#66c0f4;text-decoration:none;font-size:.9rem}
        .btn-lib{padding:.4rem 1rem;background:linear-gradient(to bottom,#2a475e,#1b3a4f);color:#66c0f4;font-size:.85rem;font-weight:700;border:1px solid #4b6a88;border-radius:2px;text-decoration:none}
        .lang-select{background:#2a475e;color:#c6d4df;border:1px solid #4b6a88;padding:.3rem .5rem;border-radius:2px;font-size:.8rem;cursor:pointer}
        .lang-select:focus{outline:none;border-color:#66c0f4}
        .breadcrumb{max-width:1200px;margin:1rem auto;padding:0 20px;font-size:.8rem;color:#8f98a0}
        .breadcrumb a{color:#66c0f4;text-decoration:none}
        .main{max-width:1200px;margin:0 auto;padding:1rem 20px 3rem}
        .game-title{font-size:1.5rem;color:#fff;font-weight:700;margin-bottom:1rem}
        .game-layout{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
        .game-media img{width:100%;border-radius:3px;display:block}
        .sidebar{background:#2a475e;border:1px solid #4b6a88;border-radius:4px;padding:1.25rem}
        .sidebar img{width:100%;border-radius:3px;margin-bottom:1rem;display:block}
        .sidebar-desc{font-size:.875rem;color:#c6d4df;line-height:1.6;margin-bottom:1.25rem;border-bottom:1px solid #4b6a88;padding-bottom:1.25rem}
        .meta-row{display:flex;justify-content:space-between;font-size:.8rem;color:#8f98a0;margin-bottom:.5rem}
        .meta-row span:last-child{color:#c6d4df}
        .review-row{margin:1rem 0;font-size:.85rem}
        .review-label{color:#8f98a0;margin-bottom:.25rem}
        .review-overwhelm{color:#a4d007;font-weight:700}
        .review-pos{color:#66c0f4;font-weight:700}
        .review-mostly{color:#c6d4df;font-weight:700}
        .tags-row{margin-bottom:1.25rem}
        .tags-label{font-size:.75rem;color:#8f98a0;margin-bottom:.4rem}
        .tags{display:flex;flex-wrap:wrap;gap:.3rem}
        .tag{background:rgba(103,193,245,.1);color:#66c0f4;padding:.15rem .5rem;border-radius:2px;font-size:.75rem;text-decoration:none}
        .tag:hover{background:rgba(103,193,245,.2)}
        .purchase-box{background:#1b2838;border:1px solid #2a475e;border-radius:3px;padding:1rem;margin-top:1rem}
        .purchase-title{font-size:.8rem;color:#8f98a0;text-transform:uppercase;margin-bottom:.75rem}
        .price-block{display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem}
        .badge-discount{background:#4c6b22;color:#a4d007;padding:.3rem .6rem;border-radius:2px;font-size:1rem;font-weight:700}
        .price-stack{display:flex;flex-direction:column}
        .price-old{text-decoration:line-through;color:#8f98a0;font-size:.8rem}
        .price-new{color:#acdbf5;font-size:1.25rem;font-weight:700}
        .price-free{color:#a4d007;font-size:1.25rem;font-weight:700}
        .btn-buy{display:block;width:100%;padding:.875rem;background:linear-gradient(to bottom,#47810a,#3d6b08);color:#acdbf5;font-weight:700;font-size:.95rem;border:none;border-radius:2px;cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.04em;text-decoration:none}
        .btn-buy:hover{background:linear-gradient(to bottom,#56980d,#4a7d0a)}
        .btn-incart{display:block;width:100%;padding:.875rem;background:linear-gradient(to bottom,#2a475e,#1b3a4f);color:#66c0f4;font-weight:700;font-size:.95rem;border:1px solid #4b6a88;border-radius:2px;cursor:pointer;text-align:center;text-decoration:none}
        .btn-owned{display:block;width:100%;padding:.875rem;background:#1b2838;color:#a4d007;font-weight:700;font-size:.95rem;border:1px solid #4c6b22;border-radius:2px;text-align:center}
        .flash-success{background:rgba(74,126,22,.15);border:1px solid #4a7e16;color:#a4d007;padding:.75rem;border-radius:2px;margin-bottom:1rem;font-size:.875rem}
        footer{background:#171d25;border-top:1px solid #2a475e;padding:2rem;text-align:center;color:#8f98a0;font-size:.8rem}
        @media(max-width:768px){.game-layout{grid-template-columns:1fr}}
    </style>
</head>
<body>
<nav>
    <div class="nav-inner">
        <a href="/" class="logo">STEAM<span>STORE</span></a>
        <a href="/store" th:text="#{nav.store}">Store</a>
        <div class="nav-right">
            <a href="/dashboard" class="btn-lib" th:text="#{nav.library}">Library</a>
            <a href="/cart" class="cart-btn">🛒 <span th:text="#{nav.cart}">Cart</span>
                <span th:if="${cartCount != null and cartCount > 0}" th:text="'(' + ${cartCount} + ')'"></span>
            </a>
            <select class="lang-select" onchange="window.location.href='?lang='+this.value">
                <option value="en" th:selected="${currentLang == 'en'}">EN</option>
                <option value="ja" th:selected="${currentLang == 'ja'}">日本語</option>
                <option value="ko" th:selected="${currentLang == 'ko'}">한국어</option>
                <option value="fr" th:selected="${currentLang == 'fr'}">FR</option>
                <option value="de" th:selected="${currentLang == 'de'}">DE</option>
                <option value="ru" th:selected="${currentLang == 'ru'}">RU</option>
                <option value="es" th:selected="${currentLang == 'es'}">ES</option>
                <option value="zh" th:selected="${currentLang == 'zh'}">中文</option>
            </select>
        </div>
    </div>
</nav>

<div class="breadcrumb">
    <a href="/">Home</a> &rsaquo; <a href="/store" th:text="#{nav.store}">Store</a> &rsaquo; <span th:text="${product.name}"></span>
</div>

<div class="main">
    <div class="game-title" th:text="${product.name}"></div>
    <div th:if="${success}" class="flash-success" th:text="${success}"></div>

    <div class="game-layout">
        <div class="game-media">
            <img th:src="${product.headerImageUrl}" th:alt="${product.name}">
        </div>
        <div class="sidebar">
            <img th:src="${product.headerImageUrl}" th:alt="${product.name}">
            <p class="sidebar-desc" th:text="${product.description}"></p>
            <div class="meta-row"><span th:text="#{game.developer}">Developer</span><span th:text="${product.developer}"></span></div>
            <div class="meta-row"><span th:text="#{game.publisher}">Publisher</span><span th:text="${product.publisher}"></span></div>
            <div class="review-row">
                <div class="review-label" th:text="#{game.reviews}">Overall Reviews:</div>
                <span class="review-overwhelm" th:if="${product.reviewSummary != null and #strings.contains(product.reviewSummary,'Overwhelmingly')}" th:text="${product.reviewSummary}"></span>
                <span class="review-pos"       th:if="${product.reviewSummary != null and #strings.contains(product.reviewSummary,'Very')}" th:text="${product.reviewSummary}"></span>
                <span class="review-mostly"    th:if="${product.reviewSummary != null and !#strings.contains(product.reviewSummary,'Overwhelmingly') and !#strings.contains(product.reviewSummary,'Very')}" th:text="${product.reviewSummary}"></span>
            </div>
            <div class="tags-row">
                <div class="tags-label" th:text="#{game.tags}">Tags:</div>
                <div class="tags">
                    <a class="tag" href="/store" th:each="tag : ${#strings.arraySplit(product.tags, ',')}" th:text="${#strings.trim(tag)}"></a>
                </div>
            </div>
            <div class="purchase-box">
                <div class="purchase-title" th:text="#{game.buy} + ' ' + ${product.name}"></div>
                <div class="price-block">
                    <span class="badge-discount" th:if="${product.discountPercent > 0}" th:text="'-' + ${product.discountPercent} + '%'"></span>
                    <div class="price-stack">
                        <span class="price-old"  th:if="${product.discountPercent > 0}"
                              th:text="${cSym} + ${#numbers.formatDecimal(product.price * cRate, 1, cDec)}"></span>
                        <span class="price-free" th:if="${product.price == 0}" th:text="#{store.free}">Free to Play</span>
                        <span class="price-new"  th:if="${product.price > 0 and product.discountPercent > 0}"
                              th:text="${cSym} + ${#numbers.formatDecimal(product.price * (1 - product.discountPercent / 100.0) * cRate, 1, cDec)}"></span>
                        <span class="price-new"  th:if="${product.price > 0 and product.discountPercent == 0}"
                              th:text="${cSym} + ${#numbers.formatDecimal(product.price * cRate, 1, cDec)}"></span>
                    </div>
                </div>
                <a th:if="${owned == null}" href="/login" class="btn-buy" th:text="#{game.signtobuy}">Sign in to Buy</a>
                <div th:if="${owned != null and owned}" class="btn-owned" th:text="#{game.owned}">✓ In your library</div>
                <a th:if="${owned != null and !owned and inCart}" href="/cart" class="btn-incart" th:text="#{game.incart}">In Cart — View Cart</a>
                <form th:if="${owned != null and !owned and !inCart}" th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn-buy" th:text="#{game.addtocart}">Add to Cart</button>
                </form>
            </div>
        </div>
    </div>
</div>
<footer>
    <span th:text="#{footer.copy}"></span> &nbsp;·&nbsp; <span th:text="#{footer.disclaimer}"></span>
</footer>
</body>
</html>
