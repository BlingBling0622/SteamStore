<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/steam.css"><link rel="stylesheet" href="/css/steam-nav.css"><title>Messages - Steam</title>
<style>
.mp{display:flex;flex:1;overflow:hidden}.lp{width:280px;background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.lp h3{font-size:.68rem;color:#5c7e9c;text-transform:uppercase;letter-spacing:.05em;padding:.65rem .8rem .3rem;font-weight:600}
.ps{overflow-y:auto;flex-shrink:0;max-height:180px}
.ci{display:flex;align-items:center;gap:.55rem;padding:.5rem .8rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03)}
.ci:hover,.ci.on{background:rgba(103,193,245,.08)}.ci.on{background:rgba(103,193,245,.18)}
.rp{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-h{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border3)}
.chat-m{flex:1;overflow-y:auto;padding:.8rem}
.chat-b{display:flex;gap:.4rem;padding:.6rem 1rem;background:var(--bg2);border-top:1px solid var(--border3)}
.chat-b textarea{flex:1;min-height:34px;max-height:80px}
.msg-body{display:flex;flex-direction:column;align-items:flex-start}
.ni{cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);position:relative}
.ni:hover{background:rgba(103,193,245,.04)}.ni .nb{display:flex;align-items:center;gap:.4rem;padding:.4rem .8rem}
.ni .nd{display:none;padding:0 .8rem .5rem 2rem;font-size:.75rem;color:var(--muted)}.ni.exp .nd{display:block}
.ni .nx{position:absolute;top:2px;right:6px;width:auto;height:auto;background:transparent!important;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;display:none;padding:0;line-height:1}.ni:hover .nx{display:block}.ni .nx:hover{color:var(--white)!important;background:transparent!important}
</style></head><body>
<div th:replace="~{fragments/nav :: steam-nav}"></div>
<div class="mp flex1">
<div class="lp">
<div class="ps" th:if="${!pendingRequests.isEmpty()}"><h3>FRIEND REQUESTS</h3>
<div th:each="r:${pendingRequests}"><div class="pend" style="margin:0 .6rem 2px;font-size:.75rem"><div class="fav" style="width:24px;height:24px;font-size:.55rem"><img th:if="${r.senderAvatarUrl!=null and !r.senderAvatarUrl.isEmpty()}" th:src="${r.senderAvatarUrl}" alt=""><span th:unless="${r.senderAvatarUrl!=null and !r.senderAvatarUrl.isEmpty()}" th:text="${#strings.toUpperCase(r.senderUsername.substring(0,1))}"></span></div><div class="info flex1"><div class="white fs-sm" th:text="${r.senderNickname}"></div><div class="fs-xs muted" th:text="${#temporals.format(r.createdAt,'MMM d')}"></div></div><div class="acts"><form th:action="@{/friends/accept}" method="post"><input type="hidden" name="requestId" th:value="${r.id}"><button class="btn-xs" style="background:var(--green);color:#d2e885">Accept</button></form><form th:action="@{/friends/decline}" method="post"><input type="hidden" name="requestId" th:value="${r.id}"><button class="btn-xs" style="background:#555;color:#aaa">Decline</button></form></div></div></div></div>
<div class="ps" th:if="${!notifications.isEmpty()}" style="max-height:200px"><h3>NOTIFICATIONS</h3>
<div th:each="n:${notifications}" class="ni" th:data-id="${n.id}" onclick="togN(this,event)"><div class="nb"><div th:if="${n.type=='PURCHASE'}" class="btn-xs" style="background:var(--green);color:#d2e885;flex-shrink:0">$</div><div th:if="${n.type=='LIBRARY'}" style="width:4px;flex-shrink:0"></div><div class="flex1" style="min-width:0"><div class="fs-sm white" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" th:text="${n.content}"></div><div class="fs-xs muted" th:text="${#temporals.format(n.createdAt,'MMM d, HH:mm')}"></div></div></div><button class="nx" th:data-id="${n.id}" onclick="disN(this,event)">&times;</button><div class="nd" th:text="${n.content}"></div></div></div>
<h3>CONVERSATIONS</h3><div class="flex1" style="overflow-y:auto" id="clist">
<div th:if="${friends.isEmpty()}" class="fs-sm muted p1">No friends yet.</div>
<div th:each="f:${friends}" class="ci" th:data-id="${f.id}" th:data-username="${f.username}" th:data-nickname="${f.nickname}" th:data-avatar="${f.avatarUrl}" th:classappend="${chatFriend!=null&&chatFriend.id==f.id?'on':''}" onclick="selChat(this)"><div class="fav"><img th:if="${!f.avatarUrl.isEmpty()}" th:src="${f.avatarUrl}" alt=""><span th:if="${f.avatarUrl.isEmpty()}" th:text="${#strings.toUpperCase(f.username.substring(0,1))}"></span></div><div class="flex1" style="min-width:0"><div class="white fs-sm" th:text="${f.nickname}"></div><div class="fs-xs muted" th:id="'prev-'+${f.id}">Click to chat</div></div><span class="hidden" th:id="'badge-'+${f.id}" style="background:var(--accent);color:var(--bg);font-size:.55rem;font-weight:700;padding:.1rem .3rem;border-radius:6px">0</span></div></div></div>
<div class="rp"><div id="nochat" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center"><div><div style="font-size:2.5rem;margin-bottom:.5rem">&#9993;</div><h3 style="color:var(--white)">Messages</h3><p class="fs-sm">Select a conversation</p></div></div>
<div id="chat" class="hidden" style="flex:1;flex-direction:column"><div class="chat-h"><div class="fav" id="ca"><img id="cai" src="" alt="" class="hidden"><span id="cal"></span></div><div><div class="white fs-sm" id="cn"></div><div class="fs-xs" style="color:var(--green2)">&bull; Online</div></div><div style="margin-left:auto"><a id="cprof" href="#" class="fs-xs muted">View Profile</a></div></div><div class="chat-m" id="cmsg"></div><div class="chat-b"><textarea id="minp" placeholder="Message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea><button id="sbtn" class="btn btn-g" onclick="sendMsg()">Send</button></div></div></div></div>
<footer><span th:text="#{footer.copy}"></span>  <span th:text="#{footer.disclaimer}"></span></footer>
<script>
var aid=null, iv=null, mu=[[${user.id}]], fa='';
function selChat(el){
    aid=el.getAttribute('data-id');
    document.querySelectorAll('.ci').forEach(function(i){i.classList.remove('on');});
    el.classList.add('on');
    document.getElementById('nochat').style.display='none';
    var c=document.getElementById('chat');c.classList.remove('hidden');c.style.display='flex';
    document.getElementById('cn').textContent=el.getAttribute('data-nickname');
    document.getElementById('cprof').href='/friends/'+aid;
    var a=el.getAttribute('data-avatar');
    if(a){document.getElementById('cai').src=a;document.getElementById('cai').classList.remove('hidden');document.getElementById('cal').classList.add('hidden');}
    else{document.getElementById('cai').classList.add('hidden');document.getElementById('cal').classList.remove('hidden');document.getElementById('cal').textContent=el.getAttribute('data-username').charAt(0).toUpperCase();}
    loadMsgs();if(iv)clearInterval(iv);iv=setInterval(loadMsgs,3000);
    var b=document.getElementById('badge-'+aid);if(b)b.classList.add('hidden');
}
function loadMsgs(){
    if(!aid)return;
    fetch('/messages/conversation/'+aid).then(function(r){return r.json()}).then(function(ms){
        var h='', ld='', ls=null;
        for(var i=0;i<ms.length;i++){
            var m=ms[i], d=fd(m.createdAt);
            if(d!==ld){h+='<div style="text-align:center;color:var(--muted);font-size:.68rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:.4rem">'+d+'</div>';ld=d;ls=null;}
            var isMine=m.senderId===mu, sc=m.senderId!==ls, cl='other';
            if(sc&&i>0)cl+=' new';
            h+='<div class="msg-row '+cl+'">';
            if(sc){if(m.senderAvatarUrl)h+='<div class="msg-av"><img src="'+esc(m.senderAvatarUrl)+'" alt=""></div>';else h+='<div class="msg-av">'+m.senderUsername.charAt(0).toUpperCase()+'</div>'}
            else{h+='<div class="msg-av ghost"></div>'}
            h+='<div class="msg-body">';
            if(sc)h+='<div class="msg-sender">'+esc(m.senderUsername)+(isMine?' (you)':'')+'</div>';
            h+='<div class="msg-bub">'+esc(m.content)+'</div><div class="msg-time">'+ft(m.createdAt)+'</div></div></div>';
            ls=m.senderId;
        }
        if(!ms.length) h='<div style="text-align:center;color:var(--muted);padding:2rem">No messages yet</div>';
        var cm=document.getElementById('cmsg');cm.innerHTML=h;cm.scrollTop=cm.scrollHeight;
    });
}
function sendMsg(){
    if(!aid)return;
    var inp=document.getElementById('minp'), c=inp.value.trim();if(!c)return;
    var b=document.getElementById('sbtn');b.disabled=true;b.textContent='...';
    var fd=new URLSearchParams();fd.append('receiverId',aid);fd.append('content',c);
    fetch('/messages/send',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()}).then(function(r){return r.json()}).then(function(d){
        if(d.success){inp.value='';loadMsgs();}else alert(d.error||'Failed');
        b.disabled=false;b.textContent='Send';
    }).catch(function(){b.disabled=false;b.textContent='Send';});
}
function togN(el,e){if(e.target.closest('.nx'))return;el.classList.toggle('exp');if(el.classList.contains('exp')){var fid=el.getAttribute('data-id'),fd=new URLSearchParams();fd.append('notificationId',fid);fetch('/messages/notification/read',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()}).then(function(r){return r.json()}).then(function(d){if(d.success){var bs=document.querySelectorAll('.badge.blue');bs.forEach(function(b){b.textContent=d.count;if(d.count<=0)b.style.display='none';});}});}}
function disN(btn,e){e.stopPropagation();var fid=btn.getAttribute('data-id'),fd=new URLSearchParams();fd.append('notificationId',fid);fetch('/messages/notification/dismiss',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()}).then(function(r){return r.json()}).then(function(d){if(d.success){var el=btn.closest('.ni');if(el){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove();},300);}}});}
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function ft(d){return new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fd(d){var dt=new Date(d),n=new Date();if(dt.toDateString()===n.toDateString())return'Today';var y=new Date(n);y.setDate(y.getDate()-1);if(dt.toDateString()===y.toDateString())return'Yesterday';return dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
(function(){var p=new URLSearchParams(window.location.search),c=p.get('chat');if(c){var el=document.querySelector(".ci[data-id='"+c+"']");if(el)selChat(el);}setInterval(function(){document.querySelectorAll('.ci').forEach(function(i){var fid=i.getAttribute('data-id');if(fid===aid)return;fetch('/messages/conversation/'+fid).then(function(r){return r.json()}).then(function(ms){if(ms.length){var l=ms[ms.length-1],pv=document.getElementById('prev-'+fid);if(pv){var w=l.senderId===mu?'You: ':'';pv.textContent=(w+l.content).substring(0,35);}var b=document.getElementById('badge-'+fid);if(b){var u=ms.filter(function(m){return m.senderId!==mu&&!m.isRead;}).length;if(u>0){b.textContent=u;b.classList.remove('hidden');}else b.classList.add('hidden');}}});});},10000);})();
</script></body></html>
