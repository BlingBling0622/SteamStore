# Application Configuration
spring.application.name=Steam Library App

# Message Source Encoding
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Server Configuration
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Database Configuration (H2 - Development)
spring.datasource.url=jdbc:h2:file:./data/steamstore;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Session Configuration
server.servlet.session.timeout=30m

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Steam API Configuration
steam.api.key=${STEAM_API_KEY:your-steam-api-key-here}
steam.openid.url=https://steamcommunity.com/openid/login
app.base.url=${APP_BASE_URL:http://localhost:8080}

# Optional explicit HTTP proxy (host:port) for outbound Steam API calls (reviews, etc.).
# Leave blank to use the OS system proxy (set via java.net.useSystemProxies=true at startup).
# Example for a local Clash/Mihomo proxy: steam.http.proxy=127.0.0.1:7897
steam.http.proxy=${STEAM_HTTP_PROXY:127.0.0.1:7897}

# Base URL of the Steam appreviews endpoint. Point this at your own reverse proxy /
# mirror when store.steampowered.com is unreachable from the server (e.g. from inside
# mainland China). Must end with "/". Examples:
#   https://store.steampowered.com/appreviews/    (Steam direct, default)
#   https://steam-reviews.your-worker.workers.dev/appreviews/   (Cloudflare Worker)
#   https://steam-mirror.your-vps.com/appreviews/               (nginx on a VPS)
steam.reviews.base-url=${STEAM_REVIEWS_BASE_URL:https://store.steampowered.com/appreviews/}
