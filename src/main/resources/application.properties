# Application Configuration
spring.application.name=Steam Library App

# Message Source Encoding
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Server Configuration
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Database Configuration (MySQL)
# Railway will provide DATABASE_URL, but we need to support local dev too
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/steam_store?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Steam API Configuration
steam.api.key=${STEAM_API_KEY:EF14D2A0BABA79B0564D16F1F6A51592}
steam.openid.url=https://steamcommunity.com/openid/login
steam.api.base.url=https://api.steampowered.com

# Application URL (for Steam OpenID return)
app.base.url=${APP_BASE_URL:http://localhost:8080}

# Session Configuration
server.servlet.session.timeout=30m
